spring.application.name=backend-test

# --- CONEXIÓN A AZURE SQL (ˇElimina todo lo de H2!) ---
# Estas líneas son las únicas que deben quedar para el datasource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Dialecto para SQL Server
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# Configuración de JPA para SQL Server
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# --- IMPORTANTE: DESHABILITA LA CONSOLA H2 ---
spring.h2.console.enabled=false