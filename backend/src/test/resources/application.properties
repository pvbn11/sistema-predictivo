spring.application.name=backend-test

# --- CONEXIÓN A AZURE SQL ---
# Usamos las variables de entorno que configuramos en Azure
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Dialecto para SQL Server
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect

# --- CONFIGURACIÓN DE TABLAS Y DATOS ---
# Usamos 'update' para que Azure cree las tablas automáticamente la primera vez
spring.jpa.hibernate.ddl-auto=update

# Habilitar ejecución de scripts al iniciar
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true