name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Compilación manual: Azure no tocará esto
      - name: Install Dependencies & Build
        working-directory: ./frontend
        run: |
          npm install
          npx ng build --configuration production

      # 2. Despliegue: Azure toma lo que ya construimos
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### RUTA DEFINITIVA ######
          # Apuntamos a la carpeta donde está el index.html
          app_location: "frontend/dist/sistema-prenatal/browser"
          api_location: ""  
          # Ya no necesitamos app_artifact_location, al poner la ruta completa arriba
          # Azure la toma como la raíz del sitio web.
          skip_app_build: true