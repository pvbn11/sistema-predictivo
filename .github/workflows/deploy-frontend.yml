name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Build
        working-directory: ./frontend
        run: |
          npm install
          npx ng build --configuration production

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Configuración de Rutas de tu App ######
          # El app_location es la carpeta base de tu proyecto Angular
          app_location: "/frontend"
          api_location: ""  
          # app_artifact_location es la ruta real donde Angular guardó el index.html
          # Es relativa a la raíz del repositorio
          app_artifact_location: "frontend/dist/sistema-prenatal/browser"
          # skip_app_build evita que Azure intente compilar de nuevo
          skip_app_build: true